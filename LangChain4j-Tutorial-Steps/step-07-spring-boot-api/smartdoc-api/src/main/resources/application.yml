server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# ============================================================
# LLM 配置
# ============================================================
llm:
  provider: ${LLM_PROVIDER:zhipu}

  # 智谱 AI 配置
  zhipu:
    base-url: https://open.bigmodel.cn/
    api-key: ${ZHIPU_API_KEY:}
    model-name: glm-4-flash

  # DeepSeek 配置（使用 OpenAI 兼容接口）
  deepseek:
    base-url: https://api.deepseek.com
    api-key: ${DEEPSEEK_API_KEY:}
    model-name: deepseek-chat

# ============================================================
# RAG 配置
# ============================================================
rag:
  # 文档分块大小（字符数）
  chunk-size: 500
  # 相邻分块的重叠字符数（保证语义在边界处的完整性）
  chunk-overlap: 100
  # 检索时返回的最大文档片段数
  max-results: 5

# ============================================================
# 聊天配置
# ============================================================
chat:
  # 单个会话保留的最大消息数（超出后自动丢弃最早的消息）
  max-memory-messages: 20

# ============================================================
# 日志配置
# ============================================================
logging:
  level:
    # LangChain4j 内部日志（调试 RAG 和工具调用时设为 DEBUG）
    dev.langchain4j: DEBUG
    # 项目日志
    com.smartdoc: DEBUG
